name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  GO_VERSION: "1.24"

jobs:
  # ─────────────────────────────────────
  #  单元测试（含 race detector）
  # ─────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Unit tests (race)
        run: |
          go test -count=1 -race -timeout 120s ./pkg/... ./benchmark/...

      - name: Coverage
        run: |
          go test -count=1 -coverprofile=coverage.out -covermode=atomic ./pkg/... ./benchmark/...
          go tool cover -func=coverage.out | tail -1

  # ─────────────────────────────────────
  #  集成测试（按需触发）
  # ─────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - name: Integration tests
        run: |
          go test -tags=integration -count=1 -timeout 300s ./tests/...

  # ─────────────────────────────────────
  #  模糊测试（仅 main 分支每日一次）
  # ─────────────────────────────────────
  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - name: Fuzz (60s per target)
        run: |
          go test -fuzz=FuzzLimiterKey -fuzztime=60s ./pkg/ruleflow/core/
          go test -fuzz=FuzzEvalWithRandomData -fuzztime=60s ./pkg/ruleflow/core/
          go test -fuzz=FuzzPanicRecovery -fuzztime=60s ./pkg/ruleflow/core/

  # ─────────────────────────────────────
  #  静态分析
  # ─────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.0
          args: --timeout=10m

  # ─────────────────────────────────────
  #  基准测试（基线检查，PR 性能回归）
  # ─────────────────────────────────────
  bench:
    name: Bench (no-compare)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - name: Run benchmarks
        run: |
          go test -bench=. -benchtime=1s -run=^$ ./benchmark/... | tee bench.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.txt
