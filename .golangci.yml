# golangci-lint 配置（V2 3.8 静态分析 CI）
# 文档: https://golangci-lint.run/usage/configuration/

version: 2

run:
  timeout: 10m
  tests: true
  # 默认检查所有目录
  build-tags:
    - integration

linters:
  # 默认启用的检查器（加上我们额外启用的）
  disable-all: true
  enable:
    - errcheck      # 检查未处理错误
    - govet         # 标准 vet
    - ineffassign   # 无效赋值
    - staticcheck   # 静态分析（覆盖最广，包含 gosimple 和 stylecheck）
    - unused        # 未使用变量/导入
    - gocritic      # 额外检查
    - misspell      # 拼写检查
    - bodyclose     # HTTP body 关闭
    - copyloopvar   # 循环变量引用
    - gocognit      # 圈复杂度
    - nestif        # 嵌套 if
    - prealloc      # slice 预分配
    - revive        # golint 替代
    - unconvert     # 不必要的类型转换
    - unparam       # 未使用参数
    - whitespace    # 空白

formatters:
  enable:
    - gofmt         # 格式
    - goimports     # import 排序

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - ifElseChain
      - hugeParam
  gocognit:
    min-complexity: 30
  nestif:
    min-complexity: 8
  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: true  # 内部包不需要每个都有注释
  goimports:
    local-prefixes: github.com/vpptu/ruleflow

issues:
  exclude-rules:
    # 测试文件允许更宽松的命名
    - path: _test\.go
      linters:
        - gocritic
        - gocognit
        - revive
    # contrib 目录的演示代码允许长函数
    - path: contrib/
      linters:
        - gocognit
        - nestif
  max-issues-per-linter: 0
  max-same-issues: 0